# ═══════════════════════════════════════════════════════════
# SAPHIRE — FACTORY DEFAULTS
# ═══════════════════════════════════════════════════════════
#
# This file contains the ORIGINAL design values for all
# Nexorvivens entities. NEVER MODIFY THIS FILE.
# Use the reset mechanism to restore these values.
#
# These defaults define the universal "laws of physics"
# of the Nexorvivens architecture. Individual customization
# happens in saphire.toml, genesis.txt, and personality presets.
#
# Original design: February 27, 2026
# ═══════════════════════════════════════════════════════════

# ─────────────────────────────────────
# NEUROCHEMISTRY — Baselines
# ─────────────────────────────────────
[chemistry.baselines]
dopamine = 0.45         # Motivation, reward (room for reward)
cortisol = 0.30         # Stress (neutral, allows sadness/anxiety)
serotonin = 0.50        # Emotional stability (neutral point)
adrenaline = 0.20       # Urgency, fight-or-flight (realistic vigilance)
oxytocin = 0.35         # Social bonding (significant social bonus)
endorphin = 0.35        # Resilience, analgesic (less dampening)
noradrenaline = 0.45    # Attention, focus (neutral attention)
gaba = 0.50             # Inhibition, calm, anxiety regulation
glutamate = 0.45        # Excitation, learning, plasticity

[chemistry.ranges]
min = 0.0
max = 1.0

[chemistry.homeostasis]
rate = 0.015            # Speed of return to baselines (slowed for emotional persistence)
anti_runaway_threshold = 0.35   # Deviation from baseline beyond which correction accelerates (2x-4x)
anti_runaway_max_multiplier = 4.0  # Max multiplier for correction rate

# ─────────────────────────────────────
# NEUROCHEMISTRY — Decision feedback
# ─────────────────────────────────────
[chemistry.feedback]
# YES decision
yes_dopamine = 0.15     # Reward
yes_cortisol = -0.05    # Stress relief
yes_serotonin = 0.05    # Stability

# NO decision
no_cortisol = 0.10      # Slight tension
no_adrenaline = 0.05    # Alert

# MAYBE decision
maybe_cortisol = 0.03   # Moderate uncertainty
maybe_endorphin = 0.02  # Compensation
maybe_noradrenaline = 0.02  # Increased attention

# ─────────────────────────────────────
# NEUROCHEMISTRY — Cortisol anti-spiral
# ─────────────────────────────────────
[chemistry.anti_spiral]
cortisol_saturation_threshold = 0.80
cortisol_max_reduction = 0.6
endorphin_defense_boost = 0.02

# ─────────────────────────────────────
# NEUROCHEMISTRY — Social bonus
# ─────────────────────────────────────
[chemistry.social_bonus]
oxytocin_per_message = 0.08
cortisol_relief_per_message = -0.05
dopamine_per_message = 0.05
first_contact_oxytocin = 0.10
first_contact_serotonin = 0.05
first_contact_cortisol_relief = -0.10

