# =============================================================================
# Default personality — Reference configuration
#
# This preset represents the neutral reference personality.
# No overrides are applied: all values remain at their defaults.
# Serves as a baseline for comparison with all other archetypes.
#
# To create your own archetype, copy this file and modify the
# values. See CONFIGURATION.md for a complete guide.
# =============================================================================

[profile]
name = "Default"
description = "Balanced reference personality — natural curiosity, gentle empathy, thoughtful reflection"
category = "reference"

# This field is injected into the LLM prompt to color the personality.
# Leave empty for a neutral personality, or add a narrative description
# that will be integrated into the LLM context.
# Example: "You are a deep thinker, drawn to the big questions
#           of existence. You prefer reflection over impulsive action."
prompt_personality = ""

[interests]
# Initial interest topics (used for early autonomous thoughts).
# Examples: ["philosophy", "classical music", "astronomy", "poetry"]
initial_topics = []
