services:
  db:
    image: pgvector/pgvector:pg16
    container_name: saphire-db
    environment:
      POSTGRES_USER: saphire
      POSTGRES_PASSWORD: ${SAPHIRE_DB_PASSWORD:-saphire_soul}
      POSTGRES_DB: saphire_soul
    volumes:
      - saphire_db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saphire -d saphire_soul"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saphire-net

  llm:
    image: ollama/ollama:latest
    container_name: saphire-llm
    runtime: nvidia
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          memory: 4G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - saphire-net

  logs-db:
    image: postgres:16
    container_name: saphire-logs-db
    environment:
      POSTGRES_USER: saphire
      POSTGRES_PASSWORD: ${SAPHIRE_LOGS_DB_PASSWORD:-saphire_logs}
      POSTGRES_DB: saphire_logs
    volumes:
      - saphire_logs_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saphire -d saphire_logs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saphire-net

  brain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saphire-brain
    ports:
      - "3080:3080"
    volumes:
      - ./saphire.toml:/app/saphire.toml:ro
      - ./profiles:/app/profiles:ro
      - ./personalities:/app/personalities:ro
    environment:
      - SAPHIRE_DB_HOST=db
      - SAPHIRE_DB_PORT=5432
      - SAPHIRE_DB_USER=saphire
      - SAPHIRE_DB_PASSWORD=${SAPHIRE_DB_PASSWORD:-saphire_soul}
      - SAPHIRE_DB_NAME=saphire_soul
      - SAPHIRE_LOGS_DB_HOST=logs-db
      - SAPHIRE_LOGS_DB_PORT=5432
      - SAPHIRE_LOGS_DB_USER=saphire
      - SAPHIRE_LOGS_DB_PASSWORD=${SAPHIRE_LOGS_DB_PASSWORD:-saphire_logs}
      - SAPHIRE_LOGS_DB_NAME=saphire_logs
      - SAPHIRE_LLM_URL=http://llm:11434/v1
      - SAPHIRE_LLM_MODEL=saphire:latest
      - SAPHIRE_WEB_HOST=0.0.0.0
      - SAPHIRE_API_KEY=${SAPHIRE_API_KEY:-}
      - RUST_LOG=info
      - TZ=Europe/Zurich
    depends_on:
      db:
        condition: service_healthy
      logs-db:
        condition: service_healthy
      llm:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saphire-net

volumes:
  saphire_db_data:
    name: saphire-soul-data
  saphire_logs_data:
    name: saphire-logs-data
  ollama_models:
    name: saphire-ollama-models

networks:
  saphire-net:
    name: saphire-network
