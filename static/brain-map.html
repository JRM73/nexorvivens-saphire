<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');
/* ─── Reset & Base ──────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#c8c8d8;font-family:'Share Tech Mono','Consolas',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}
::selection{background:#4a9eff44;color:#fff}

/* ─── Toolbar ───────────────────────────────────────────────── */
#toolbar{height:48px;background:#12121e;border-bottom:1px solid #2a2a3e;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:100}
#toolbar h1{font-family:'Orbitron','Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;margin-right:20px;white-space:nowrap;background:linear-gradient(90deg,#00f0ff,#b537f2,#ff2a6d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(0,240,255,0.4))}
#toolbar h1 .page-label{font-size:12px;letter-spacing:1.5px;-webkit-text-fill-color:rgba(0,240,255,0.7)}
#toolbar a{color:#888;font-size:11px;text-decoration:none;border:1px solid #2a2a3e;padding:6px 12px;border-radius:4px;transition:all .15s}
#toolbar a:hover{color:#4a9eff;border-color:#4a9eff;background:#1a1a2e}
.toolbar-sep{width:1px;height:24px;background:#2a2a3e;margin:0 4px}
#toolbar .legend{font-size:10px;color:#666;margin-left:auto}

/* ─── Switch LIVE ──────────────────────────────────────────── */
.live-switch{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.live-switch input{display:none}
.live-label{font-size:11px;color:#666;transition:color .3s}
.live-switch.active .live-label{color:#4aff88}
.live-track{width:36px;height:18px;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:9px;position:relative;transition:all .3s}
.live-switch.active .live-track{border-color:#4aff88;background:#1a2e1a}
.live-thumb{width:14px;height:14px;background:#555;border-radius:50%;position:absolute;top:1px;left:1px;transition:all .3s}
.live-switch.active .live-thumb{left:19px;background:#4aff88;box-shadow:0 0 8px #4aff8866}
.live-dot{width:6px;height:6px;border-radius:50%;background:#333;margin-left:2px;transition:background .3s}
.live-switch.active .live-dot{background:#4aff88;animation:live-blink 1s infinite}
@keyframes live-blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── Canvas ────────────────────────────────────────────────── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:default}
canvas{display:block}

/* ─── Tooltip ───────────────────────────────────────────────── */
#tooltip{display:none;position:fixed;background:#12121eee;border:1px solid #4a9eff88;color:#c8c8d8;padding:10px 14px;font-size:11px;border-radius:6px;z-index:300;pointer-events:none;max-width:320px;box-shadow:0 4px 20px #000a;backdrop-filter:blur(4px)}
#tooltip .tt-cat{font-size:9px;letter-spacing:1px;margin-bottom:4px;opacity:.7}
#tooltip .tt-name{font-family:'Orbitron','Share Tech Mono',monospace;font-size:13px;font-weight:bold;margin-bottom:6px}
#tooltip .tt-desc{color:#999;line-height:1.4}
#tooltip .tt-conns{margin-top:6px;font-size:10px;color:#4a9eff88}

/* ─── Minimap ───────────────────────────────────────────────── */
#minimap{position:fixed;bottom:12px;right:12px;width:180px;height:140px;background:#0e0e1a;border:1px solid #2a2a3e;border-radius:6px;z-index:200;opacity:.8}
#minimap:hover{opacity:1}

</style>

  chemistry:     '#4aff88',
  emotion:       '#ff4a88',
  brain:         '#b44aff',
  consciousness: '#44ffee',

// ─── Layout radial ──────────────────────────────────────────────────────────

const NODE_RADIUS = 38;
const CENTER_X = 0, CENTER_Y = 0;
const RING_RADII = [0, 280, 580];

// Categories ordonnees pour la disposition
const CAT_ORDER = [
  'CHIMIE','EMOTION','CERVEAU','CONSCIENCE',
  'CORPS','MEMOIRE','PSYCHOLOGIE','IDENTITE',
  'ETHIQUE','INTELLIGENCE','CONDITIONS','CHAMPS','SORTIE'
];

// Calculer positions des noeuds
function computeLayout() {
  // Centre : 3 noeuds de l'Etincelle
  const centerNodes = NODES.filter(n => n.ring === 0);
  const centerAngleStep = (Math.PI * 2) / centerNodes.length;
  centerNodes.forEach((n, i) => {
    const a = -Math.PI / 2 + i * centerAngleStep;
    n.x = CENTER_X + Math.cos(a) * 60;
    n.y = CENTER_Y + Math.sin(a) * 60;
  });

  // Couronnes exterieures : grouper par categorie
  const ring1Nodes = NODES.filter(n => n.ring === 1);
  const ring2Nodes = NODES.filter(n => n.ring === 2);

  layoutRing(ring1Nodes, RING_RADII[1]);
  layoutRing(ring2Nodes, RING_RADII[2]);
}

function layoutRing(nodes, radius) {
  // Grouper par categorie, respecter l'ordre
  const groups = {};
  for (const n of nodes) {
    if (!groups[n.cat]) groups[n.cat] = [];
    groups[n.cat].push(n);
  }

  // Compter les noeuds pour distribuer l'espace proportionnellement
  const total = nodes.length;
  const catList = CAT_ORDER.filter(c => groups[c]);
  const gapAngle = 0.08; // Espace entre groupes
  const totalGap = gapAngle * catList.length;
  const usableAngle = Math.PI * 2 - totalGap;

  let angle = -Math.PI / 2;
  for (const cat of catList) {
    const grp = groups[cat];
    const sliceAngle = (grp.length / total) * usableAngle;
    const stepAngle = sliceAngle / grp.length;

    for (let i = 0; i < grp.length; i++) {
      const a = angle + stepAngle * (i + 0.5);
      grp[i].x = CENTER_X + Math.cos(a) * radius;
      grp[i].y = CENTER_Y + Math.sin(a) * radius;
      grp[i]._angle = a;
    }
    angle += sliceAngle + gapAngle;
  }
}

computeLayout();

// Index rapide
const nodeById = {};
NODES.forEach(n => nodeById[n.id] = n);

// ─── Canvas & Viewport ─────────────────────────────────────────────────────

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W, H;
let vpX = 0, vpY = 0, vpScale = 0.8;

// Pan state
let panning = null;
let hoveredNode = null;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  cv.width = W * devicePixelRatio;
  cv.height = H * devicePixelRatio;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  // Centre initial
  if (!panning && vpX === 0 && vpY === 0) {
    vpX = W / 2;
    vpY = H / 2;
  }
  draw();
}
window.addEventListener('resize', resize);
// Observer aussi les changements de taille du wrapper (chargement fonts, reflow)
new ResizeObserver(() => resize()).observe(document.getElementById('canvas-wrap'));

function screenToWorld(sx, sy) {
  return [(sx - vpX) / vpScale, (sy - vpY) / vpScale];
}

function worldToScreen(wx, wy) {
  return [wx * vpScale + vpX, wy * vpScale + vpY];
}

// ─── Dessin ─────────────────────────────────────────────────────────────────

function draw() {
  // Reinitialiser la transform de base a chaque frame (evite les corruptions)
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  ctx.clearRect(0, 0, W, H);

  // Fond
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  // Grille pointillee
  ctx.save();
  ctx.translate(vpX, vpY);
  ctx.scale(vpScale, vpScale);

  const gs = 40;
  const x0 = Math.floor(-vpX / vpScale / gs) * gs - gs;
  const y0 = Math.floor(-vpY / vpScale / gs) * gs - gs;
  const x1 = x0 + W / vpScale + gs * 2;
  const y1 = y0 + H / vpScale + gs * 2;
  ctx.fillStyle = '#1a1a2e';
  for (let gx = x0; gx < x1; gx += gs) {
    for (let gy = y0; gy < y1; gy += gs) {
      ctx.fillRect(gx, gy, 1.5, 1.5);
    }
  }

  // Anneaux de reference (cercles discrets)
  ctx.setLineDash([4, 8]);
  ctx.lineWidth = 0.5;
  for (const r of RING_RADII) {
    if (r === 0) continue;
    ctx.beginPath();
    ctx.arc(CENTER_X, CENTER_Y, r - 40, 0, Math.PI * 2);
    ctx.strokeStyle = '#1a1a2e';
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Halos de groupe (arcs colores) — ring 1
  drawGroupHalos(NODES.filter(n => n.ring === 1), RING_RADII[1], 50);
  // Halos ring 2
  drawGroupHalos(NODES.filter(n => n.ring === 2), RING_RADII[2], 50);

  // Halo central
  ctx.beginPath();
  ctx.arc(CENTER_X, CENTER_Y, 110, 0, Math.PI * 2);
  const cg = ctx.createRadialGradient(CENTER_X, CENTER_Y, 40, CENTER_X, CENTER_Y, 110);
  cg.addColorStop(0, '#ffcc0018');
  cg.addColorStop(1, '#ffcc0000');
  ctx.fillStyle = cg;
  ctx.fill();

  // Connexions
  try { drawConnections(); } catch (err) { console.error('[brain-map] drawConnections error:', err); }

  // Noeuds
  for (const n of NODES) {
    try { drawNode(n, n === hoveredNode); } catch (err) { console.error('[brain-map] drawNode error:', n.id, err); }
  }

  ctx.restore();

  // Minimap
  try { drawMinimap(); } catch (err) { console.error('[brain-map] drawMinimap error:', err); }
}

// Helper : convertit #RRGGBB + alpha (0-1) en rgba() compatible partout
function hexA(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${Math.max(0, Math.min(1, a))})`;
}

function drawGroupHalos(nodes, radius, spread) {
  // Grouper par categorie
  const groups = {};
  for (const n of nodes) {
    if (!groups[n.cat]) groups[n.cat] = [];
    groups[n.cat].push(n);
  }

  for (const cat of Object.keys(groups)) {
    const grp = groups[cat];
    if (grp.length === 0) continue;
    const angles = grp.map(n => n._angle).sort((a, b) => a - b);
    const aMin = angles[0] - 0.06;
    const aMax = angles[angles.length - 1] + 0.06;
    const color = COLORS[cat] || '#4a9eff';

    ctx.beginPath();
    ctx.arc(CENTER_X, CENTER_Y, radius, aMin, aMax);
    ctx.strokeStyle = hexA(color, 0.08);
    ctx.lineWidth = spread;
    ctx.stroke();

    // Label de categorie
    const aMid = (aMin + aMax) / 2;
    const lx = CENTER_X + Math.cos(aMid) * (radius + spread / 2 + 14);
    const ly = CENTER_Y + Math.sin(aMid) * (radius + spread / 2 + 14);
    ctx.save();
    ctx.translate(lx, ly);
    // Rotation pour que le texte soit lisible
    let rot = aMid;
    if (rot > Math.PI / 2 || rot < -Math.PI / 2) rot += Math.PI;
    ctx.rotate(rot);
    ctx.fillStyle = hexA(color, 0.33);
    ctx.font = '9px "Orbitron", "Share Tech Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(cat, 0, 0);
    ctx.restore();
  }
}

function drawConnections() {
  for (const c of CONNECTIONS) {
    const from = nodeById[c.from];
    const to = nodeById[c.to];
    if (!from || !to) continue;

    const color = CONN_COLORS[c.type] || '#4a9eff';
    const isHighlight = hoveredNode && (hoveredNode.id === c.from || hoveredNode.id === c.to);
    const alpha = isHighlight ? 'aa' : '33';

    // Courbe de Bezier
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const dist = Math.hypot(dx, dy);
    const cpOff = dist * 0.3;

    // Points de controle vers le centre pour un look organique
    const midX = (from.x + to.x) / 2;
    const midY = (from.y + to.y) / 2;
    const toCenter = Math.hypot(midX - CENTER_X, midY - CENTER_Y);
    const pullFactor = Math.min(0.3, 80 / (toCenter + 1));
    const cx1 = from.x + (midX - from.x) * 0.5 - (midX - CENTER_X) * pullFactor;
    const cy1 = from.y + (midY - from.y) * 0.5 - (midY - CENTER_Y) * pullFactor;
    const cx2 = to.x - (to.x - midX) * 0.5 - (midX - CENTER_X) * pullFactor;
    const cy2 = to.y - (to.y - midY) * 0.5 - (midY - CENTER_Y) * pullFactor;

    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.bezierCurveTo(cx1, cy1, cx2, cy2, to.x, to.y);
    ctx.strokeStyle = hexA(color, isHighlight ? 0.67 : 0.2);
    ctx.lineWidth = isHighlight ? 2 : 0.8;
    ctx.stroke();

    // Fleche
    if (isHighlight) {
      const t = 0.92;
      const u = 1 - t;
      const px = u*u*u*from.x + 3*u*u*t*cx1 + 3*u*t*t*cx2 + t*t*t*to.x;
      const py = u*u*u*from.y + 3*u*u*t*cy1 + 3*u*t*t*cy2 + t*t*t*to.y;
      const angle = Math.atan2(to.y - py, to.x - px);
      ctx.beginPath();
      ctx.moveTo(to.x, to.y);
      ctx.lineTo(to.x - 10 * Math.cos(angle - 0.35), to.y - 10 * Math.sin(angle - 0.35));
      ctx.moveTo(to.x, to.y);
      ctx.lineTo(to.x - 10 * Math.cos(angle + 0.35), to.y - 10 * Math.sin(angle + 0.35));
      ctx.strokeStyle = hexA(color, 0.8);
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Label sur la connexion
      const lx = (from.x + to.x) / 2 - (midX - CENTER_X) * pullFactor * 0.5;
      const ly = (from.y + to.y) / 2 - (midY - CENTER_Y) * pullFactor * 0.5;
      ctx.fillStyle = hexA(color, 0.6);
      ctx.font = '8px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(c.label, lx, ly - 4);
    }
  }
}

function drawNode(n, isHovered) {
  const color = COLORS[n.cat] || '#4a9eff';
  const r = n.ring === 0 ? NODE_RADIUS + 6 : NODE_RADIUS;

  // Glow
  if (isHovered || n.ring === 0) {
    const glowR = isHovered ? r + 18 : r + 10;
    const grd = ctx.createRadialGradient(n.x, n.y, r * 0.5, n.x, n.y, glowR);
    grd.addColorStop(0, hexA(color, isHovered ? 0.27 : 0.13));
    grd.addColorStop(1, hexA(color, 0));
    ctx.beginPath();
    ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // Cercle principal
  ctx.beginPath();
  ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  ctx.fillStyle = isHovered ? '#1e1e32' : '#0e0e1a';
  ctx.fill();
  ctx.strokeStyle = hexA(color, isHovered ? 0.87 : 0.53);
  ctx.lineWidth = isHovered ? 2.5 : 1.5;
  ctx.stroke();

  // Nom du noeud (centree)
  ctx.fillStyle = isHovered ? '#fff' : '#d0d0e0';
  ctx.font = (n.ring === 0 ? 'bold 10px' : '9px') + ' "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Decouper le nom si trop long
  const words = n.name.split(' ');
  if (words.length <= 2 && n.name.length <= 14) {
    ctx.fillText(n.name, n.x, n.y);
  } else {
    // 2 lignes
    const mid = Math.ceil(words.length / 2);
    const line1 = words.slice(0, mid).join(' ');
    const line2 = words.slice(mid).join(' ');
    ctx.fillText(line1, n.x, n.y - 6);
    ctx.fillText(line2, n.x, n.y + 6);
  }

  // Petit indicateur de categorie sous le cercle
  if (n.ring > 0) {
    ctx.fillStyle = hexA(color, 0.33);
    ctx.font = '7px "Share Tech Mono", monospace';
    ctx.fillText(n.cat, n.x, n.y + r + 10);
  }
}

// ─── Minimap ────────────────────────────────────────────────────────────────

// Initialiser le canvas minimap une seule fois (evite le reset a chaque frame)
const _mmCanvas = document.getElementById('minimap');
const _mmCtx = _mmCanvas.getContext('2d');
const _mmW = 180, _mmH = 140;
_mmCanvas.width = _mmW * devicePixelRatio;
_mmCanvas.height = _mmH * devicePixelRatio;
_mmCanvas.style.width = _mmW + 'px';
_mmCanvas.style.height = _mmH + 'px';

function drawMinimap() {
  const mc = _mmCtx;
  const mw = _mmW, mh = _mmH;
  mc.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);

  mc.clearRect(0, 0, mw, mh);
  mc.fillStyle = '#0e0e1a';
  mc.fillRect(0, 0, mw, mh);

  // Echelle de la minimap
  const maxR = RING_RADII[2] + 80;
  const scale = Math.min(mw, mh) / (maxR * 2.4);
  const ox = mw / 2, oy = mh / 2;

  // Noeuds minuscules
  for (const n of NODES) {
    const color = COLORS[n.cat] || '#4a9eff';
    mc.beginPath();
    mc.arc(ox + n.x * scale, oy + n.y * scale, 2, 0, Math.PI * 2);
    mc.fillStyle = hexA(color, 0.53);
    mc.fill();
  }

  // Viewport rectangle
  const vx1 = (-vpX / vpScale) * scale + ox;
  const vy1 = (-vpY / vpScale) * scale + oy;
  const vw = (W / vpScale) * scale;
  const vh = (H / vpScale) * scale;
  mc.strokeStyle = '#4a9eff66';
  mc.lineWidth = 1;
  mc.strokeRect(vx1, vy1, vw, vh);
}

// ─── Interactions ───────────────────────────────────────────────────────────

function nodeAt(wx, wy) {
  for (const n of NODES) {
    const r = n.ring === 0 ? NODE_RADIUS + 6 : NODE_RADIUS;
    if (Math.hypot(wx - n.x, wy - n.y) <= r) return n;
  }
  return null;
}

cv.addEventListener('mousedown', e => {
  if (e.button === 0 || e.button === 1) {
    e.preventDefault();
    panning = { startX: e.clientX, startY: e.clientY, vpX0: vpX, vpY0: vpY };
    cv.style.cursor = 'grabbing';
  }
});

cv.addEventListener('mousemove', e => {
  const rect = cv.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (panning) {
    vpX = panning.vpX0 + (e.clientX - panning.startX);
    vpY = panning.vpY0 + (e.clientY - panning.startY);
    draw();
    return;
  }

  const [wx, wy] = screenToWorld(sx, sy);
  const node = nodeAt(wx, wy);

  if (node !== hoveredNode) {
    hoveredNode = node;
    cv.style.cursor = node ? 'pointer' : 'default';
    draw();

    // Tooltip
    const tt = document.getElementById('tooltip');
    if (node) {
      tt.querySelector('.tt-cat').textContent = node.cat;
      tt.querySelector('.tt-cat').style.color = COLORS[node.cat];
      tt.querySelector('.tt-name').textContent = node.name;
      tt.querySelector('.tt-name').style.color = COLORS[node.cat];
      tt.querySelector('.tt-desc').textContent = node.desc;

      // Connexions liees
      const incoming = CONNECTIONS.filter(c => c.to === node.id).map(c => nodeById[c.from]?.name + ' → ' + c.label);
      const outgoing = CONNECTIONS.filter(c => c.from === node.id).map(c => c.label + ' → ' + nodeById[c.to]?.name);
      const connText = [...incoming.map(s => '← ' + s), ...outgoing.map(s => '→ ' + s)].join('\n');
      tt.querySelector('.tt-conns').textContent = connText || 'Aucune connexion';
      tt.querySelector('.tt-conns').style.whiteSpace = 'pre-line';

      tt.style.display = 'block';
      // Positionner a cote du curseur
      const ttW = tt.offsetWidth;
      const ttH = tt.offsetHeight;
      let tx = e.clientX + 16;
      let ty = e.clientY - 10;
      if (tx + ttW > window.innerWidth - 10) tx = e.clientX - ttW - 16;
      if (ty + ttH > window.innerHeight - 10) ty = window.innerHeight - ttH - 10;
      if (ty < 50) ty = 50;
      tt.style.left = tx + 'px';
      tt.style.top = ty + 'px';
    } else {
      tt.style.display = 'none';
    }
  } else if (hoveredNode) {
    // Update tooltip position while hovering
    const tt = document.getElementById('tooltip');
    const ttW = tt.offsetWidth;
    const ttH = tt.offsetHeight;
    let tx = e.clientX + 16;
    let ty = e.clientY - 10;
    if (tx + ttW > window.innerWidth - 10) tx = e.clientX - ttW - 16;
    if (ty + ttH > window.innerHeight - 10) ty = window.innerHeight - ttH - 10;
    if (ty < 50) ty = 50;
    tt.style.left = tx + 'px';
    tt.style.top = ty + 'px';
  }
});

cv.addEventListener('mouseup', () => {
  if (panning) {
    panning = null;
    cv.style.cursor = hoveredNode ? 'pointer' : 'default';
  }
});

cv.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
  hoveredNode = null;
  panning = null;
  draw();
});

// Zoom molette
cv.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.max(0.15, Math.min(4, vpScale * zoomFactor));
  vpX = mx - (mx - vpX) * (newScale / vpScale);
  vpY = my - (my - vpY) * (newScale / vpScale);
  vpScale = newScale;
  draw();
}, { passive: false });

// Empecher menu contextuel natif
cv.addEventListener('contextmenu', e => e.preventDefault());

// ─── Animation subtile des noeuds centraux ──────────────────────────────────

let animT = 0;
const centerNodes = NODES.filter(n => n.ring === 0);
const centerOrigPos = centerNodes.map(n => ({ x: n.x, y: n.y }));

let animFrameId = null;

function animate() {
  animFrameId = requestAnimationFrame(animate); // Toujours planifier le prochain frame
  try {
    animT += 0.008;
    // Pulsation lente du centre
    for (let i = 0; i < centerNodes.length; i++) {
      const phase = (Math.PI * 2 / 3) * i;
      centerNodes[i].x = centerOrigPos[i].x + Math.cos(animT + phase) * 3;
      centerNodes[i].y = centerOrigPos[i].y + Math.sin(animT * 0.7 + phase) * 3;
    }
    // Animer les particules en mode live
    if (liveMode) updateParticles();
    draw();
  } catch (err) {
    console.error('[brain-map] animate error:', err);
  }
}

// ─── Fetch API par batches (evite le rate-limiting) ─────────────────────────

async function fetchLiveData() {
  try {
  const f = (url) => fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);

  // Batches de 6 pour rester sous le rate limit (120 req/min)
  const urls = [
    '/api/chemistry', '/api/hormones', '/api/body/status',
    '/api/vital/status', '/api/intuition/status', '/api/premonition/active',
    '/api/metacognition', '/api/turing', '/api/senses/status',
    '/api/memory/stats', '/api/attention/status', '/api/healing/status',
    '/api/sleep/status', '/api/dreams/status', '/api/desires/status',
    '/api/sentiments/status', '/api/consciousness-metrics', '/api/brain-regions',
    '/api/predictive', '/api/connectome/metrics', '/api/will/status',
    '/api/mortality', '/api/ethics/readiness', '/api/needs',
    '/api/learning/status', '/api/profiles/current', '/api/personalities/current',
    '/api/nutrition/status', '/api/grey-matter/status', '/api/fields/status',
  ];
  const results = [];
  for (let i = 0; i < urls.length; i += 6) {
    const batch = urls.slice(i, i + 6).map(u => f(u));
    const batchResults = await Promise.all(batch);
    results.push(...batchResults);
    // Petite pause entre batches pour ne pas saturer le serveur
    if (i + 6 < urls.length) await new Promise(r => setTimeout(r, 100));
  }
  const [
    chem, hormData, bodyStatus, vitalStatus, intuStatus, premoData,
    metaCog, turingData, sensesData, memStats, attStatus, healStatus,
    sleepData, dreamsData, desiresData, sentData, consMetrics,
    regionsData, predData, connMetrics, willData, mortalData,
    ethicsData, needsData, learnData, profData, persData,
    nutriData, greyData, fieldsData,
  ] = results;

  // ─── Mapper les donnees vers l'activite des noeuds ──────────────────────

  // Chimie : moyenne des 7 NT
  if (chem) {
    const levels = chem.levels || chem;
    const vals = Object.values(levels).filter(v => typeof v === 'number');
    nodeActivity['neurochimie'] = vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
    nodeActivity['interactions'] = nodeActivity['neurochimie'] * 0.8;
    nodeActivity['recepteurs'] = chem.receptors ? Object.values(chem.receptors).filter(v => typeof v === 'number').reduce((a,b) => a+b,0) / 7 : nodeActivity['neurochimie'] * 0.6;
  }

  // Hormones
  if (hormData) {
    const hLevels = hormData.levels || hormData;
    const hVals = Object.values(hLevels).filter(v => typeof v === 'number');
    nodeActivity['hormones'] = hVals.length ? hVals.reduce((a,b) => a+b, 0) / hVals.length : 0.3;
  }

  // Corps
  if (bodyStatus) {
    nodeActivity['coeur'] = bodyStatus.heart ? Math.min(1, (bodyStatus.heart.bpm || 72) / 120) : 0.5;
    nodeActivity['soma'] = bodyStatus.tension !== undefined ? bodyStatus.tension : 0.3;
    nodeActivity['physiologie'] = bodyStatus.energy !== undefined ? bodyStatus.energy : 0.4;
  }

  // Vital
  if (vitalStatus) {
    nodeActivity['vitalspark'] = vitalStatus.survival_drive !== undefined ? vitalStatus.survival_drive : (vitalStatus.alive ? 0.9 : 0.1);
  }

  // Intuition
  if (intuStatus) {
    nodeActivity['intuition'] = intuStatus.confidence !== undefined ? intuStatus.confidence : (intuStatus.active ? 0.7 : 0.2);
  }

  // Premonition
  if (premoData) {
    const premoList = Array.isArray(premoData) ? premoData : (premoData.active || []);
    nodeActivity['premonition'] = Math.min(1, premoList.length * 0.3 + 0.1);
  }

  // Metacognition
  if (metaCog) {
    nodeActivity['metacognition'] = metaCog.thought_quality !== undefined ? metaCog.thought_quality : 0.5;
  }

  // Turing
  if (turingData) {
    nodeActivity['turing'] = turingData.score !== undefined ? turingData.score / 100 : 0.3;
  }

  // Sens
  if (sensesData) {
    const sVals = Object.values(sensesData.acuity || sensesData).filter(v => typeof v === 'number');
    nodeActivity['sens5'] = sVals.length ? sVals.reduce((a,b) => a+b, 0) / sVals.length : 0.5;
  }

  // Memoire
  if (memStats) {
    nodeActivity['working'] = memStats.working !== undefined ? Math.min(1, memStats.working / 7) : 0.4;
    nodeActivity['episodique'] = memStats.episodic !== undefined ? Math.min(1, memStats.episodic / 500) : 0.3;
    nodeActivity['ltm'] = memStats.ltm !== undefined ? Math.min(1, memStats.ltm / 200000) : 0.2;
    nodeActivity['archives'] = memStats.archives !== undefined ? Math.min(1, memStats.archives / 1000) : 0.1;
    nodeActivity['reconsolidation'] = 0.2;
  }

  // Attention
  if (attStatus) {
    nodeActivity['attention'] = attStatus.focus !== undefined ? attStatus.focus : 0.5;
  }

  // Guerison
  if (healStatus) {
    nodeActivity['guerison'] = healStatus.active_wounds !== undefined ? Math.min(1, healStatus.active_wounds * 0.2) : 0.1;
  }

  // Sommeil
  if (sleepData) {
    nodeActivity['sommeil'] = sleepData.is_sleeping ? 0.9 : (sleepData.sleep_drive !== undefined ? sleepData.sleep_drive : 0.2);
  }

  // Reves
  if (dreamsData) {
    nodeActivity['reves'] = dreamsData.is_dreaming ? 0.9 : 0.1;
  }

  // Desirs
  if (desiresData) {
    const dList = desiresData.active || [];
    nodeActivity['desirs'] = Math.min(1, dList.length * 0.15 + 0.1);
  }

  // Sentiments
  if (sentData) {
    const sList = sentData.active || sentData;
    const sArr = Array.isArray(sList) ? sList : Object.values(sList).filter(v => typeof v === 'number');
    nodeActivity['sentiments20'] = sArr.length ? Math.min(1, sArr.length * 0.1 + 0.2) : 0.3;
    nodeActivity['humeur'] = sentData.mood !== undefined ? Math.abs(sentData.mood) : 0.4;
  }

  // Emotions (derives de la chimie)
  nodeActivity['emotions36'] = nodeActivity['neurochimie'] * 0.9 + 0.1;

  // Conscience metrics
  if (consMetrics) {
    nodeActivity['iit_gwt'] = consMetrics.phi !== undefined ? Math.min(1, consMetrics.phi) : 0.5;
    nodeActivity['metriques'] = consMetrics.lzc !== undefined ? consMetrics.lzc : 0.4;
  }

  // Regions cerebrales
  if (regionsData) {
    const rVals = Object.values(regionsData.activations || regionsData).filter(v => typeof v === 'number');
    nodeActivity['regions12'] = rVals.length ? rVals.reduce((a,b) => a+b, 0) / rVals.length : 0.4;
  }

  // Predictif
  if (predData) {
    nodeActivity['predictive'] = predData.surprise !== undefined ? predData.surprise : 0.3;
  }

  // MAP Sync — activite = coherence (1 - tension estimee)
  // Tension estimee : ecart entre sens et regions mappees
  if (regionsData && sensesData) {
    const regs = regionsData.activations || regionsData;
    const r = Array.isArray(regs) ? regs : Object.values(regs).filter(v => typeof v === 'object');
    const temporal = r[9] ? (r[9].activation || 0) : 0.3;
    const insula   = r[4] ? (r[4].activation || 0) : 0.3;
    const ofc      = r[8] ? (r[8].activation || 0) : 0.3;
    const sReading   = sensesData.reading   ? (sensesData.reading.intensity   || 0) : 0;
    const sListening = sensesData.listening  ? (sensesData.listening.intensity || 0) : 0;
    const sContact   = sensesData.contact    ? (sensesData.contact.intensity   || 0) : 0;
    const sTaste     = sensesData.taste      ? (sensesData.taste.intensity     || 0) : 0;
    const sAmbiance  = sensesData.ambiance   ? (sensesData.ambiance.intensity  || 0) : 0;
    const tension = (Math.abs(sReading - temporal) + Math.abs(sListening - temporal)
      + Math.abs(sContact - insula) + Math.abs(sTaste - ofc) + Math.abs(sAmbiance - ofc)) / 5;
    nodeActivity['map_sync'] = Math.max(0.1, 1.0 - tension);
  } else {
    nodeActivity['map_sync'] = 0.3;
  }

  // Connectome
  if (connMetrics) {
    nodeActivity['connectome'] = connMetrics.density !== undefined ? connMetrics.density : 0.3;
  }

  // Volonte
  if (willData) {
    nodeActivity['volonte'] = willData.willpower !== undefined ? willData.willpower : 0.5;
  }

  // Mortalite
  if (mortalData) {
    nodeActivity['mortalite'] = mortalData.alive ? 0.2 : 0.9;
  }

  // Ethique
  if (ethicsData) {
    nodeActivity['ethique3'] = ethicsData.readiness !== undefined ? ethicsData.readiness : 0.5;
    nodeActivity['regulation'] = nodeActivity['ethique3'] * 0.7;
  }

  // Besoins
  if (needsData) {
    const hunger = needsData.hunger !== undefined ? needsData.hunger : 0.3;
    const thirst = needsData.thirst !== undefined ? needsData.thirst : 0.3;
    nodeActivity['besoins'] = (hunger + thirst) / 2;
  }

  // Apprentissage
  if (learnData) {
    nodeActivity['apprentissage'] = learnData.active ? 0.7 : 0.2;
  }

  // Cerveaux (derive du consensus)
  nodeActivity['cerveaux3'] = (nodeActivity['neurochimie'] * 0.5 + (nodeActivity['emotions36'] || 0) * 0.5);
  nodeActivity['consensus'] = nodeActivity['cerveaux3'] * 0.8;
  nodeActivity['micro_nn'] = nodeActivity['consensus'] * 0.6;

  // Identite (plutot stables)
  nodeActivity['genome'] = 0.3;
  nodeActivity['profils_cog'] = profData ? 0.5 : 0.2;
  nodeActivity['personnalite'] = persData ? 0.5 : 0.2;
  nodeActivity['relations'] = 0.3;
  nodeActivity['famille'] = 0.2;
  nodeActivity['ocean'] = 0.4;

  // Sortie
  nodeActivity['broadcast'] = nodeActivity['consensus'] * 0.5;
  nodeActivity['autotuning'] = 0.3;
  nodeActivity['llm'] = nodeActivity['consensus'] * 0.7 + 0.1;
  nodeActivity['connaissances'] = 0.3;
  nodeActivity['conditions15'] = 0.2;

  // Nutrition
  if (nutriData) {
    const atp = nutriData.energy?.atp_reserves ?? 0.5;
    const protein = nutriData.protein_level ?? 0.5;
    nodeActivity['nutrition'] = (atp + protein) / 2;
    nodeActivity['energie_atp'] = atp;
  }

  // Matiere grise
  if (greyData) {
    nodeActivity['grey_matter'] = greyData.grey_matter_volume ?? 0.5;
    nodeActivity['myelination'] = greyData.myelination ?? 0.5;
    nodeActivity['neuroplast'] = greyData.neuroplasticity ?? 0.5;
  }

  // Champs electromagnetiques
  if (fieldsData) {
    nodeActivity['champ_univ'] = fieldsData.universal?.harmonic_alignment ?? 0.3;
    nodeActivity['champ_sol'] = fieldsData.solar?.activity_index ?? 0.3;
    nodeActivity['champ_terre'] = fieldsData.terrestrial?.storm_intensity ?? 0.2;
    nodeActivity['biochamp'] = fieldsData.biofield?.aura_luminosity ?? 0.4;
  }

  // ─── Clamper toutes les activites a [0, 1] (evite debordement hex) ────
  for (const id of Object.keys(nodeActivity)) {
    const v = nodeActivity[id];
    if (typeof v !== 'number' || !isFinite(v)) nodeActivity[id] = 0;
    else nodeActivity[id] = Math.max(0, Math.min(1, v));
  }

  // ─── Calculer le flux des connexions ────────────────────────────────────
  CONNECTIONS.forEach((c, i) => {
    const fromAct = nodeActivity[c.from] || 0;
    const toAct = nodeActivity[c.to] || 0;
    connFlow[i] = Math.max(0, Math.min(1, (fromAct + toAct) / 2));
  });

  // ─── Generer des particules pour les connexions actives ─────────────────
  CONNECTIONS.forEach((c, i) => {
    if (connFlow[i] > 0.4) {
      // Probabilite proportionnelle au flux (reduite pour lisibilite)
      if (Math.random() < (connFlow[i] - 0.4) * 0.5) {
        particles.push({
          connIdx: i,
          t: 0,
          speed: 0.005 + connFlow[i] * 0.015,
          color: CONN_COLORS[c.type] || '#4a9eff',
        });
      }
    }
  });
  } catch (err) { console.warn('fetchLiveData error:', err); }
}

// ─── Particules animees ─────────────────────────────────────────────────────

function updateParticles() {
  particles = particles.filter(p => {
    p.t += p.speed;
    return p.t < 1;
  });
  // Limiter le nombre de particules
  if (particles.length > 80) particles = particles.slice(-80);
}

// ─── Surcharger drawNode pour le mode LIVE ──────────────────────────────────

const _origDrawNode = drawNode;

drawNode = function(n, isHovered) {
  const color = COLORS[n.cat] || '#4a9eff';
  const r = n.ring === 0 ? NODE_RADIUS + 6 : NODE_RADIUS;
  const activity = liveMode ? Math.max(0, Math.min(1, nodeActivity[n.id] || 0)) : 0;

  // Glow amplifie par l'activite en mode live
  if (isHovered || n.ring === 0 || (liveMode && activity > 0.1)) {
    const glowIntensity = Math.min(1, liveMode ? Math.max(activity * 0.7, isHovered ? 0.5 : 0) : (isHovered ? 0.5 : 0.2));
    const glowR = r + 8 + glowIntensity * 14;
    const grd = ctx.createRadialGradient(n.x, n.y, r * 0.3, n.x, n.y, glowR);
    grd.addColorStop(0, hexA(color, glowIntensity));
    grd.addColorStop(1, hexA(color, 0));
    ctx.beginPath();
    ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // Cercle principal — bordure plus intense si actif
  ctx.beginPath();
  ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  const bgBright = liveMode && activity > 0.3 ? Math.round(14 + activity * 16) : (isHovered ? 30 : 14);
  ctx.fillStyle = `rgb(${bgBright}, ${bgBright}, ${Math.round(bgBright * 2)})`;
  ctx.fill();
  const borderAlpha = Math.min(1, liveMode ? Math.max(0.53, activity) : (isHovered ? 0.87 : 0.53));
  ctx.strokeStyle = hexA(color, borderAlpha);
  ctx.lineWidth = isHovered ? 2.5 : (liveMode && activity > 0.5 ? 2 : 1.5);
  ctx.stroke();

  // Nom du noeud
  ctx.fillStyle = isHovered ? '#fff' : (liveMode && activity > 0.5 ? '#f0f0ff' : '#d0d0e0');
  ctx.font = (n.ring === 0 ? 'bold 10px' : '9px') + ' "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const words = n.name.split(' ');
  if (words.length <= 2 && n.name.length <= 14) {
    ctx.fillText(n.name, n.x, liveMode && activity > 0.1 ? n.y - 4 : n.y);
  } else {
    const mid = Math.ceil(words.length / 2);
    ctx.fillText(words.slice(0, mid).join(' '), n.x, n.y - 6 - (liveMode && activity > 0.1 ? 2 : 0));
    ctx.fillText(words.slice(mid).join(' '), n.x, n.y + 6 - (liveMode && activity > 0.1 ? 2 : 0));
  }

  // Afficher la valeur d'activite en mode live
  if (liveMode && activity > 0.05) {
    const pct = Math.round(activity * 100);
    ctx.fillStyle = hexA(color, 0.73);
    ctx.font = 'bold 8px "Share Tech Mono", monospace';
    ctx.fillText(pct + '%', n.x, n.y + (words.length <= 2 && n.name.length <= 14 ? 10 : 14));
  }

  // Categorie sous le cercle
  if (n.ring > 0) {
    ctx.fillStyle = hexA(color, 0.33);
    ctx.font = '7px "Share Tech Mono", monospace';
    ctx.fillText(n.cat, n.x, n.y + r + 10);
  }
};

// ─── Surcharger drawConnections pour le mode LIVE ───────────────────────────

const _origDrawConnections = drawConnections;

drawConnections = function() {
  for (let i = 0; i < CONNECTIONS.length; i++) {
    const c = CONNECTIONS[i];
    const from = nodeById[c.from];
    const to = nodeById[c.to];
    if (!from || !to) continue;

    const color = CONN_COLORS[c.type] || '#4a9eff';
    const isHighlight = hoveredNode && (hoveredNode.id === c.from || hoveredNode.id === c.to);
    const flow = liveMode ? Math.max(0, Math.min(1, connFlow[i] || 0)) : 0;

    // Alpha et epaisseur selon le flux
    let alphaVal, lineW;
    if (isHighlight) {
      alphaVal = 0.67;
      lineW = 2;
    } else if (liveMode && flow > 0.2) {
      // Echelle douce : seules les connexions bien actives ressortent
      const strength = Math.min(1, (flow - 0.2) / 0.8); // 0..1
      alphaVal = 0.1 + strength * 0.5;
      lineW = 0.5 + strength * 1.5;
    } else if (liveMode) {
      alphaVal = 0.16;
      lineW = 0.6;
    } else {
      alphaVal = 0.2;
      lineW = 0.8;
    }

    // Calcul Bezier
    const midX = (from.x + to.x) / 2;
    const midY = (from.y + to.y) / 2;
    const toCenter = Math.hypot(midX - CENTER_X, midY - CENTER_Y);
    const pullFactor = Math.min(0.3, 80 / (toCenter + 1));
    const cx1 = from.x + (midX - from.x) * 0.5 - (midX - CENTER_X) * pullFactor;
    const cy1 = from.y + (midY - from.y) * 0.5 - (midY - CENTER_Y) * pullFactor;
    const cx2 = to.x - (to.x - midX) * 0.5 - (midX - CENTER_X) * pullFactor;
    const cy2 = to.y - (to.y - midY) * 0.5 - (midY - CENTER_Y) * pullFactor;

    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.bezierCurveTo(cx1, cy1, cx2, cy2, to.x, to.y);
    ctx.strokeStyle = hexA(color, alphaVal);
    ctx.lineWidth = lineW;
    ctx.stroke();

    // Fleche (hover ou flux fort)
    if (isHighlight || (liveMode && flow > 0.6)) {
      const t = 0.92;
      const u = 1 - t;
      const px = u*u*u*from.x + 3*u*u*t*cx1 + 3*u*t*t*cx2 + t*t*t*to.x;
      const py = u*u*u*from.y + 3*u*u*t*cy1 + 3*u*t*t*cy2 + t*t*t*to.y;
      const angle = Math.atan2(to.y - py, to.x - px);
      ctx.beginPath();
      ctx.moveTo(to.x, to.y);
      ctx.lineTo(to.x - 10 * Math.cos(angle - 0.35), to.y - 10 * Math.sin(angle - 0.35));
      ctx.moveTo(to.x, to.y);
      ctx.lineTo(to.x - 10 * Math.cos(angle + 0.35), to.y - 10 * Math.sin(angle + 0.35));
      ctx.strokeStyle = hexA(color, isHighlight ? 0.8 : alphaVal);
      ctx.lineWidth = isHighlight ? 1.5 : 1;
      ctx.stroke();
    }

    // Label (hover uniquement)
    if (isHighlight) {
      const lx = (from.x + to.x) / 2 - (midX - CENTER_X) * pullFactor * 0.5;
      const ly = (from.y + to.y) / 2 - (midY - CENTER_Y) * pullFactor * 0.5;
      ctx.fillStyle = hexA(color, 0.6);
      ctx.font = '8px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(c.label, lx, ly - 4);
    }
  }

  // ─── Dessiner les particules ────────────────────────────────────────────
  if (liveMode) {
    for (const p of particles) {
      const c = CONNECTIONS[p.connIdx];
      if (!c) continue;
      const from = nodeById[c.from];
      const to = nodeById[c.to];
      if (!from || !to) continue;

      const midX = (from.x + to.x) / 2;
      const midY = (from.y + to.y) / 2;
      const toCenter = Math.hypot(midX - CENTER_X, midY - CENTER_Y);
      const pullFactor = Math.min(0.3, 80 / (toCenter + 1));
      const cx1 = from.x + (midX - from.x) * 0.5 - (midX - CENTER_X) * pullFactor;
      const cy1 = from.y + (midY - from.y) * 0.5 - (midY - CENTER_Y) * pullFactor;
      const cx2 = to.x - (to.x - midX) * 0.5 - (midX - CENTER_X) * pullFactor;
      const cy2 = to.y - (to.y - midY) * 0.5 - (midY - CENTER_Y) * pullFactor;

      const t = p.t;
      const u = 1 - t;
      const px = u*u*u*from.x + 3*u*u*t*cx1 + 3*u*t*t*cx2 + t*t*t*to.x;
      const py = u*u*u*from.y + 3*u*u*t*cy1 + 3*u*t*t*cy2 + t*t*t*to.y;

      // Point lumineux
      const grd = ctx.createRadialGradient(px, py, 0, px, py, 6);
      grd.addColorStop(0, hexA(p.color, 0.8));
      grd.addColorStop(1, hexA(p.color, 0));
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();

      // Point central
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }
  }
};

// ─── Init ───────────────────────────────────────────────────────────────────

resize();
animate();

// ─── Reprise animation apres navigation back/forward (bfcache) ──────────────
// Quand le navigateur restaure la page depuis le bfcache, requestAnimationFrame
// peut etre gele. On relance l'animation et on force un redraw.
window.addEventListener('pageshow', function(e) {
  if (e.persisted) {
    // Page restauree depuis le bfcache : annuler l'ancien RAF et relancer
    if (animFrameId) cancelAnimationFrame(animFrameId);
    resize();
    animate();
  }
});

// Quand l'onglet redevient visible apres avoir ete masque, forcer un redraw
document.addEventListener('visibilitychange', function() {
  if (!document.hidden) {
    resize();
    draw();
    // Relancer le fetch live si actif
    if (liveMode && !liveInterval) {
      fetchLiveData();
      liveInterval = setInterval(fetchLiveData, 5000);
    }
  }
});

</script>
